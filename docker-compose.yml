version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: db
    restart: always
    ports:
      - "3306:3306"
    env_file:
      - config.env
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - red_wordpress

  wordpress:
    image: wordpress:latest
    container_name: wordpress
    restart: always
    depends_on:
      - db
    ports:
      - "8080:80"
    env_file:
      - config.env
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - red_wordpress
      
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins_server
    privileged: true
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker    
volumes:
  db-data:
  wordpress_data:
  jenkins-data:

networks:
  red_wordpress:
    driver: bridge